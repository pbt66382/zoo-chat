<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoo AI 客服 - 会议服务</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0f1419;
      color: #e7e9ea;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: #161b22;
      border-bottom: 1px solid #2f3336;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .header-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #f0a500, #ff6b35);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .header-text h1 {
      font-size: 1.1rem;
      color: #f0a500;
    }

    .header-text p {
      font-size: 0.75rem;
      color: #8899a6;
    }

    /* Chat Container */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    /* Welcome Message */
    .welcome-card {
      background: #161b22;
      border: 1px solid #2f3336;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    .welcome-card h2 {
      color: #f0a500;
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }

    .welcome-card p {
      color: #8899a6;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* Message Bubbles */
    .message {
      display: flex;
      gap: 0.75rem;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .message.user .avatar {
      background: #f0a500;
    }

    .message.assistant .avatar {
      background: #21262d;
      border: 1px solid #30363d;
    }

    .bubble {
      max-width: 70%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 0.95rem;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #f0a500;
      color: #0f1419;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #161b22;
      border: 1px solid #2f3336;
      border-bottom-left-radius: 4px;
    }

    /* Loading indicator */
    .loading {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #8899a6;
      font-size: 0.9rem;
      padding: 0.5rem 0;
    }

    .loading-dots {
      display: flex;
      gap: 4px;
    }

    .loading-dots span {
      width: 6px;
      height: 6px;
      background: #8899a6;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .loading-dots span:nth-child(1) { animation-delay: 0s; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Input Area */
    .input-area {
      background: #161b22;
      border-top: 1px solid #2f3336;
      padding: 1rem 1.5rem;
      flex-shrink: 0;
    }

    .input-wrapper {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }

    .input-box {
      flex: 1;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      transition: border-color 0.2s;
    }

    .input-box:focus-within {
      border-color: #f0a500;
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e7e9ea;
      font-family: inherit;
      font-size: 0.95rem;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }

    textarea::placeholder {
      color: #536471;
    }

    .send-btn {
      background: #f0a500;
      color: #0f1419;
      border: none;
      border-radius: 10px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: #ffb733;
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      background: #30363d;
      color: #536471;
      cursor: not-allowed;
    }

    /* Quick suggestions */
    .suggestions {
      max-width: 800px;
      margin: 0 auto;
      padding-top: 0.75rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .suggestion-chip {
      background: #21262d;
      border: 1px solid #30363d;
      color: #71c9ce;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .suggestion-chip:hover {
      background: #1a2a3a;
      border-color: #71c9ce;
    }

    /* Status bar */
    .status-bar {
      background: #0d1117;
      border-top: 1px solid #2f3336;
      padding: 0.4rem 1.5rem;
      font-size: 0.75rem;
      color: #536471;
      display: flex;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .status-bar .model {
      color: #71c9ce;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">Z</div>
    <div class="header-text">
      <h1>Zoo AI 智能客服</h1>
      <p>会议服务 · Phase 1 · DeepSeek</p>
    </div>
  </div>

  <!-- Chat Area -->
  <div class="chat-container" id="chatContainer">
    <div class="welcome-card">
      <h2>欢迎使用 Zoo 会议服务客服</h2>
      <p>我是您的智能客服助手，可以帮您解答关于 Zoo 会议服务的问题，<br>
         如创建会议、共享屏幕、音频设置等。</p>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <div class="input-wrapper">
      <div class="input-box">
        <textarea
          id="messageInput"
          placeholder="请输入您的问题..."
          rows="1"
          onkeydown="handleKeyDown(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          &#10148;
        </button>
      </div>
    </div>
    <div class="suggestions">
      <span class="suggestion-chip" onclick="quickAsk('如何创建会议')">如何创建会议</span>
      <span class="suggestion-chip" onclick="quickAsk('如何共享屏幕')">如何共享屏幕</span>
      <span class="suggestion-chip" onclick="quickAsk('会议中没有声音')">会议中没有声音</span>
      <span class="suggestion-chip" onclick="quickAsk('如何预约会议')">如何预约会议</span>
      <span class="suggestion-chip" onclick="quickAsk('如何开启视频')">如何开启视频</span>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span>Zoo AI Chat · Phase 1</span>
    <span>Powered by <span class="model">DeepSeek</span></span>
  </div>

  <script>
    let sessionId = null;
    let history = [];  // 维护对话历史，供多轮对话使用
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // Auto-resize textarea
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // Handle Enter key (Shift+Enter for newline)
    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    // Quick suggestion click
    function quickAsk(question) {
      messageInput.value = question;
      autoResize(messageInput);
      sendMessage();
    }

    // Scroll to bottom
    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // Add message to chat
    function addMessage(role, content) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;

      const avatar = role === 'user'
        ? '<div class="avatar">&#128100;</div>'
        : '<div class="avatar">Z</div>';

      msgDiv.innerHTML = `
        ${avatar}
        <div class="bubble">${escapeHtml(content)}</div>
      `;

      chatContainer.appendChild(msgDiv);
      scrollToBottom();
    }

    // Add loading indicator
    function addLoading() {
      const loadingDiv = document.createElement('div');
      loadingDiv.className = 'message assistant';
      loadingDiv.id = 'loadingIndicator';
      loadingDiv.innerHTML = `
        <div class="avatar">Z</div>
        <div class="bubble">
          <div class="loading">
            <div class="loading-dots">
              <span></span><span></span><span></span>
            </div>
            AI 正在思考...
          </div>
        </div>
      `;
      chatContainer.appendChild(loadingDiv);
      scrollToBottom();
    }

    // Remove loading indicator
    function removeLoading() {
      const loading = document.getElementById('loadingIndicator');
      if (loading) loading.remove();
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML.replace(/\n/g, '<br>');
    }

    // Send message
    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;

      // Disable input while processing
      messageInput.value = '';
      autoResize(messageInput);
      sendBtn.disabled = true;

      // Add user message
      addMessage('user', message);

      // Add loading indicator
      addLoading();

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: message,
            history: history,
            session_id: sessionId
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        sessionId = data.session_id;

        // 将本轮对话存入 history，供下一轮使用（Memory 机制）
        history.push({ role: 'user', content: message });
        history.push({ role: 'assistant', content: data.answer });

        removeLoading();
        addMessage('assistant', data.answer);

      } catch (error) {
        removeLoading();
        addMessage('assistant', `抱歉，发生了错误：${error.message}。请检查后端服务是否正常运行。`);
      }

      // Re-enable input
      sendBtn.disabled = false;
      messageInput.focus();
    }

    // Focus input on load
    messageInput.focus();
  </script>

</body>
</html>
